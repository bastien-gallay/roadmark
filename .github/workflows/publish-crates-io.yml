# Publishes `roadmark` to crates.io via Trusted Publishing (OIDC) — no
# long-lived token is stored anywhere. Invoked by the dist-generated
# `release.yml` as a custom publish job (`publish-jobs = ["./publish-crates-io"]`
# in dist-workspace.toml), so it only runs after a `v<semver>` tag has built
# and hosted a successful release. dist grants the calling job `id-token: write`,
# which `rust-lang/crates-io-auth-action` exchanges for an ephemeral token.
#
# One-time setup on crates.io (Settings -> Trusted Publishing) for the
# `roadmark` crate: repository `bastien-gallay/roadmark`, workflow
# `publish-crates-io.yml`.
name: Publish to crates.io

on:
  workflow_call:
    # dist passes the release plan manifest to every custom publish job.
    inputs:
      plan:
        required: true
        type: string

jobs:
  publish-crates-io:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master (no semver tags upstream)
        with:
          toolchain: stable
      - name: Mint an ephemeral crates.io token (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: cargo publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
