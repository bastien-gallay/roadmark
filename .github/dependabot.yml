version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      cargo-minor-and-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels: [dependencies, rust]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
    # `.github/workflows/release.yml` is generated by cargo-dist and pins its
    # own `actions/checkout`; editing it out-of-band breaks the `dist plan`
    # self-consistency check. In `ci.yml`, checkout is SHA-pinned and current.
    # Neither is dependabot's to bump — update release.yml via `dist init`.
    ignore:
      - dependency-name: "actions/checkout"
    commit-message:
      prefix: "chore(ci)"
    labels: [dependencies, ci]
